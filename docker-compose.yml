services:
  backend:
    container_name: insighta-backend
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_PATH: /app/data/insighta.db
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8080/auth/github/callback}
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  backend-data:
